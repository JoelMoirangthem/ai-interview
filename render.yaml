services:
  - type: web
    name: ai-interview-coach-api
    runtime: node
    repo: https://github.com/JoelMoirangthem/ai-interview
    plan: free
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PORT
        value: 3000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: IMAGEKIT_URL_ENDPOINT
        sync: false
      - key: CORS_ORIGIN
        value: https://ai-interview-coach.onrender.com,https://ai-interview-coach-mwke.onrender.com,http://localhost:5173,http://localhost:5174

  - type: web
    name: ai-interview-coach
    runtime: static
    repo: https://github.com/JoelMoirangthem/ai-interview
    plan: free
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://ai-interview-coach-api-mwke.onrender.com/api
      - key: VITE_FIREBASE_API
        value: AIzaSyA9-lXJzhSKdMAQY9c-dWwL1HETY24TM7Y
      - key: VITE_FIREBASE_AUTH_DOMAIN
        value: ai-interview-9a2d4.firebaseapp.com
      - key: VITE_FIREBASE_PROJECT_ID
        value: ai-interview-9a2d4
      - key: VITE_FIREBASE_STORAGE_BUCKET
        value: ai-interview-9a2d4.firebasestorage.app
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        value: "88518098812"
      - key: VITE_FIREBASE_APP_ID
        value: 1:88518098812:web:79c47bcf90dac6304a2ef9
